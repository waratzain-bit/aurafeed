<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Aurafeed</title>
    <script type="text/javascript">
      // Trik SPA: Alihkan URL rute dinamis kembali ke index.html bawaan Vite
      var pathSegmentsToKeep = 1; // Setel 1 jika aplikasi Anda berada di sub-folder /aurafeed

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/_p=' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Mengarahkan halaman...
  </body>
</html>
